<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Successful - Shree Balaji Traders</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #e8f5e9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
    .card { background: white; padding: 40px; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
    h1 { color: #2e7d32; margin-bottom: 10px; }
    .order-id-box { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 20px 0; word-break: break-all; }
    .track-btn { display: inline-block; margin: 10px; padding: 12px 25px; background: #ff5722; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    .whatsapp-share { background: #25d366; }
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <i class="fas fa-check-circle" style="font-size: 4rem; color: #2e7d32;"></i>
    <h1>Order Confirmed! 🎉</h1>
    <p>Thank you for shopping with Shree Balaji Traders.</p>
    
    <div class="order-id-box">
      <strong>Your Order ID:</strong><br>
      <span id="oid" style="font-size: 1.2rem; font-weight: bold;">Loading...</span>
    </div>
    
    <p style="color: #666;">🔔 Save this Order ID to track your delivery</p>
    
    <div class="btn-group">
      <a href="/" class="track-btn" style="background: #2e7d32;">
        <i class="fas fa-home"></i> Return to Shop
      </a>
      <button onclick="trackOrder()" class="track-btn" style="background: #2196f3;">
        <i class="fas fa-truck"></i> Track Order
      </button>
      <button onclick="shareOnWhatsApp()" class="track-btn whatsapp-share">
        <i class="fab fa-whatsapp"></i> Share on WhatsApp
      </button>
    </div>
    
    <p style="margin-top: 20px; font-size: 0.85rem; color: #888;">
      <i class="fas fa-clock"></i> Estimated Delivery: 15-30 minutes
    </p>
  </div>
  
  <script>
    const orderId = new URLSearchParams(window.location.search).get('id');
    document.getElementById('oid').innerText = orderId || 'Order Placed';
    
    function trackOrder() {
      sessionStorage.setItem('track_order_id', orderId);
      window.location.href = '/';
      setTimeout(() => {
        const trackModal = document.getElementById('trackModal');
        if (trackModal) {
          document.getElementById('trackOrderId').value = orderId;
          trackModal.classList.add('show');
          trackOrder();
        }
      }, 500);
    }
    
    function shareOnWhatsApp() {
      const message = `🍅 *Shree Balaji Traders* 🧅\n\n✅ My order has been confirmed!\n📦 Order ID: ${orderId}\n🔗 Track here: ${window.location.origin}/?track=${orderId}\n\nThank you for fresh fruits & vegetables! 🥬🍎`;
      window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
    }
    
    // Auto-open tracking if coming from WhatsApp
    if (window.location.search.includes('track=')) {
      setTimeout(() => {
        const trackId = new URLSearchParams(window.location.search).get('track');
        if (trackId && window.opener) {
          // This is a popup, close it
          window.close();
        }
      }, 100);
    }
  </script>
</body>
</html>
