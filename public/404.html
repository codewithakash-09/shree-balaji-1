<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Shree Balaji Traders</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#e8f5e9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .box{text-align:center;max-width:500px}
    .box h1{font-size:120px;color:#2e7d32}
    .box h2{color:#333;margin-bottom:15px}
    .box p{color:#666;margin-bottom:25px}
    .btn{display:inline-block;padding:12px 30px;background:#2e7d32;color:white;text-decoration:none;border-radius:8px;font-weight:600}
    .btn:hover{background:#1b5e20}
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn"><i class="fas fa-home"></i> Back to Home</a>
  </div>
</body>
</html>
