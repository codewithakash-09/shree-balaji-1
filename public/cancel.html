<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Cancelled - Shree Balaji Traders</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Poppins',sans-serif;
      background: linear-gradient(135deg, #fff9c4 0%, #ffccbc 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .box{
      width:min(520px, 100%);
      background:#fff;
      border-radius:18px;
      box-shadow:0 20px 60px rgba(0,0,0,.12);
      padding:28px;
      text-align:center;
    }
    .icon{
      width:92px;height:92px;border-radius:50%;
      background:#ff5722;color:#fff;
      display:grid;place-items:center;
      margin:0 auto 14px;
    }
    .icon i{font-size:44px}
    h1{color:#ff5722;font-size:26px;margin-bottom:6px}
    .muted{color:#666}
    .msg{
      margin:16px 0;
      background:#fff3e0;
      border-left:5px solid #ff5722;
      border-radius:12px;
      padding:14px;
      text-align:left;
      color:#555;
      font-weight:600;
      font-size:.95rem;
    }
    .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;}
    a.btn{
      flex:1;
      min-width: 180px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 14px;
      border-radius:12px;
      text-decoration:none;
      font-weight:800;
      color:#fff;
    }
    .home{background:#2e7d32}
    .cart{background:#ff5722}
    .small{font-size:12px;color:#888;margin-top:16px}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon"><i class="fas fa-times-circle"></i></div>
    <h1>Payment Cancelled</h1>
    <p class="muted">No charge was made. Your cart is still saved.</p>

    <div class="msg">
      <div><i class="fas fa-info-circle"></i> You can try again anytime.</div>
      <div style="margin-top:8px"><i class="fas fa-shopping-cart"></i> Tap "View Cart" to continue checkout.</div>
    </div>

    <div class="row">
      <a class="btn home" href="/"><i class="fas fa-home"></i> Return to Shop</a>
      <a class="btn cart" href="/?openCart=1"><i class="fas fa-shopping-cart"></i> View Cart</a>
    </div>

    <div class="small">
      Need help? Call: +91 7266887304
    </div>
  </div>
</body>
</html>
